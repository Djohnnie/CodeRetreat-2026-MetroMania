name: Build Player Package

on:
  push:
    branches: [main]
    paths:
      - 'src/MetroMania.Engine/**'
      - 'src/MetroMania.Domain/**'
      - 'src/MetroMania.PlayerSdk/**'
      - 'src/MetroMania.PlayerTemplate/**'
      - 'tools/generate-model-docs.ps1'
      - 'MetroMania.PlayerTemplate.slnx'
  workflow_dispatch:

jobs:
  build-player-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools (Obfuscar)
        run: dotnet tool restore

      - name: Build obfuscated Player SDK
        run: dotnet build src/MetroMania.PlayerSdk -c Release

      - name: Stage player package
        run: |
          mkdir -p stage/src/MetroMania.PlayerTemplate/binaries

          # Solution file at package root
          cp MetroMania.PlayerTemplate.slnx stage/

          # Project source files — exclude build outputs, stale binaries, and the template source
          rsync -a \
            --exclude='bin/' \
            --exclude='obj/' \
            --exclude='binaries/' \
            --exclude='*.template.md' \
            src/MetroMania.PlayerTemplate/ \
            stage/src/MetroMania.PlayerTemplate/

          # Replace binaries with freshly obfuscated DLLs from the SDK build
          cp output/PlayerSdk/*.dll stage/src/MetroMania.PlayerTemplate/binaries/

      - name: Generate model documentation
        shell: pwsh
        run: |
          ./tools/generate-model-docs.ps1 `
            -TemplatePath src/MetroMania.PlayerTemplate/metromania-model.template.md `
            -OutputPath   stage/src/MetroMania.PlayerTemplate/metromania-model.md `
            -RepoRoot     .

      - name: Zip player package
        run: |
          cd stage
          zip -r ../MetroMania.PlayerTemplate.zip .

      - name: Upload player package artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetroMania.PlayerTemplate
          path: stage/
          if-no-files-found: error
          retention-days: 90

      - name: Upload to Azure Blob Storage
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob upload \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --container-name downloads \
              --name MetroMania.PlayerTemplate.zip \
              --file MetroMania.PlayerTemplate.zip \
              --overwrite true
