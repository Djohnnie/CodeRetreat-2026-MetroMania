name: Build Player SDK

on:
  push:
    branches: [main]
    paths:
      - 'src/MetroMania.Engine/**'
      - 'src/MetroMania.Domain/**'
      - 'src/MetroMania.PlayerSdk/**'
  workflow_dispatch:

jobs:
  build-player-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools (Obfuscar)
        run: dotnet tool restore

      - name: Build obfuscated Player SDK
        run: dotnet build src/MetroMania.PlayerSdk -c Release

      - name: Upload Player SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetroMania.PlayerSdk
          path: output/PlayerSdk/
          if-no-files-found: error
          retention-days: 90
