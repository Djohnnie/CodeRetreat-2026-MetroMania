name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: metromania-cxh8cjhgc3hue7bc.azurecr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - image: metromania-web
            dockerfile: src/MetroMania.Web/Dockerfile
          - image: metromania-api
            dockerfile: src/MetroMania.Api/Dockerfile
          - image: metromania-worker-runner
            dockerfile: src/MetroMania.Worker.Runner/Dockerfile
          - image: metromania-worker-renderer
            dockerfile: src/MetroMania.Worker.Renderer/Dockerfile
          - image: metromania-cleanup-processor
            dockerfile: src/MetroMania.CleanupProcessor/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:latest,${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  restart-container-apps:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      RESOURCE_GROUP: rg-metromania

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart metromania-web
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name metromania-web \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/metromania-web:${{ github.sha }}

      - name: Restart metromania-api
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name metromania-api \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/metromania-api:${{ github.sha }}

      - name: Restart metromania-worker-runner
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name metromania-worker-runner \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/metromania-runner-worker:${{ github.sha }}

      - name: Restart metromania-worker-renderer
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name metromania-worker-renderer \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/metromania-renderer-worker:${{ github.sha }}

      - name: Update metromania-cleanup-processor job
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp job update \
              --name metromania-cleanup-processor \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/metromania-cleanup-processor:${{ github.sha }}
