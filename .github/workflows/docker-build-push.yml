name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: metromania-cxh8cjhgc3hue7bc.azurecr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - image: metromania-web
            dockerfile: src/MetroMania.Web/Dockerfile
          - image: metromania-api
            dockerfile: src/MetroMania.Api/Dockerfile
          - image: metromania-worker
            dockerfile: src/MetroMania.Worker/Dockerfile
          - image: metromania-orleans-host
            dockerfile: src/MetroMania.Orleans.Host/Dockerfile
          - image: metromania-orleans-validationhost
            dockerfile: src/MetroMania.Orleans.ValidationHost/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:latest,${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
