  <circle cx="230" cy="365" r="6" fill="#4ecca3" opacity="0.9"/>
  <text x="252" y="372" font-family="Arial,Helvetica,sans-serif"
    font-size="22" fill="#d0d0e8" font-weight="400">Je kunt lijnen aanmaken of uitbreiden om stations te verbinden</text>

  <circle cx="230" cy="430" r="6" fill="#f9a825" opacity="0.9"/>
  <text x="252" y="437" font-family="Arial,Helvetica,sans-serif"
    font-size="22" fill="#d0d0e8" font-weight="400">Zet treinen in op lijnen om tussen stations te rijden</text>

  <circle cx="230" cy="495" r="6" fill="#a78bfa" opacity="0.9"/>
  <text x="252" y="502" font-family="Arial,Helvetica,sans-serif"
    font-size="22" fill="#d0d0e8" font-weight="400">Je treinen en lijnen bewegen door het netwerk om reizigers af te leveren</text>
</svg>