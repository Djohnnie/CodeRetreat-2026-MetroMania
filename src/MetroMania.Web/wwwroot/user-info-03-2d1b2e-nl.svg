  <rect x="760" y="98" width="380" height="110" rx="12"
    fill="#a78bfa" fill-opacity="0.05" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>

  <g transform="translate(950,138) scale(3.5)">
    <path d="M-9,-6 L8,-6 L11,0 L8,6 L-9,6 A2,2 0 0 1 -11,4 L-11,-4 A2,2 0 0 1 -9,-6 Z"
      fill="#a78bfa" stroke="white" stroke-width="0.8"/>
  </g>

  <text x="950" y="183" text-anchor="middle" font-family="Arial Black,Arial,sans-serif"
    font-size="22" font-weight="900" fill="#a78bfa" letter-spacing="3">TREIN</text>

  <line x1="200" y1="230" x2="1080" y2="230" stroke="url(#tb)" stroke-width="1.5" opacity="0.25"/>
  <circle cx="230" cy="300" r="6" fill="#e94560" opacity="0.9"/>
  <text x="252" y="307" font-family="Arial,Helvetica,sans-serif"
