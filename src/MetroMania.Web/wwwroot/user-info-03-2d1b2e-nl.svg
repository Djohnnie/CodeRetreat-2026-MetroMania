<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="gl" cx="25%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#2d1b2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gr" cx="75%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2d1b2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gc" cx="50%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#f9a825" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2d1b2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="tb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4ecca3"/>
    </linearGradient>
    <filter id="neon" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="#2d1b2e"/>
  <rect width="1280" height="720" fill="url(#gl)"/>
  <rect width="1280" height="720" fill="url(#gr)"/>
  <rect width="1280" height="720" fill="url(#gc)"/>
  <rect width="1280" height="720" fill="url(#scanlines)"/>
  <rect width="1280" height="4" fill="url(#tb)"/>

  <g opacity="0.06">
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#a78bfa" stroke-width="1"/>
    <line x1="0" y1="496" x2="1280" y2="496" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="0" y1="514" x2="1280" y2="514" stroke="#a78bfa" stroke-width="0.6"/>
    <line x1="0" y1="534" x2="1280" y2="534" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="556" x2="1280" y2="556" stroke="#a78bfa" stroke-width="0.4"/>
    <line x1="640" y1="480" x2="640" y2="576" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="640" y1="480" x2="440" y2="576" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="640" y1="480" x2="840" y2="576" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="640" y1="480" x2="200" y2="576" stroke="#a78bfa" stroke-width="0.4"/>
    <line x1="640" y1="480" x2="1080" y2="576" stroke="#a78bfa" stroke-width="0.4"/>
    <line x1="640" y1="480" x2="-80" y2="576" stroke="#a78bfa" stroke-width="0.3"/>
    <line x1="640" y1="480" x2="1360" y2="576" stroke="#a78bfa" stroke-width="0.3"/>
  </g>

  <g stroke-width="2" fill="none" opacity="0.25">
    <polyline points="80,60 80,30 110,30" stroke="#e94560"/>
    <polyline points="1200,60 1200,30 1170,30" stroke="#a78bfa"/>
    <polyline points="80,520 80,550 110,550" stroke="#a78bfa"/>
    <polyline points="1200,520 1200,550 1170,550" stroke="#e94560"/>
  </g>
  <text x="640" y="68" text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
