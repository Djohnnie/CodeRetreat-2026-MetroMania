  <line x1="210" y1="138" x2="450" y2="138"
    stroke="#e94560" stroke-width="24" stroke-linecap="round" opacity="0.06"/>
  <line x1="220" y1="138" x2="440" y2="138"
    stroke="#e94560" stroke-width="8" stroke-linecap="round"/>
  <circle cx="270" cy="138" r="12" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
  <circle cx="390" cy="138" r="12" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>

  <text x="330" y="183" text-anchor="middle" font-family="Arial Black,Arial,sans-serif"
    font-size="22" font-weight="900" fill="#e94560" letter-spacing="3">LIJN</text>

  <text x="640" y="160" text-anchor="middle" font-family="Arial,sans-serif"
