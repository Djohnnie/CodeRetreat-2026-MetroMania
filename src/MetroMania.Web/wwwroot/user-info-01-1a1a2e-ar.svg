<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Ambient glow: warm pink from upper-left -->
    <radialGradient id="gl" cx="25%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- Ambient glow: cool teal from upper-right -->
    <radialGradient id="gr" cx="75%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#4ecca3" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- Central spotlight behind title -->
    <radialGradient id="gc" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#f9a825" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- Title text gradient (red → gold → teal) -->
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#4ecca3"/>
    </linearGradient>
    <!-- Horizontal bar gradient -->
    <linearGradient id="tb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#4ecca3"/>
    </linearGradient>
    <!-- Neon glow filter -->
    <filter id="neon" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft wide glow for background text shadow -->
    <filter id="neon-wide" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Station icon glow -->
    <filter id="sg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- CRT scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- ── Background ── -->
  <rect width="1280" height="720" fill="#1a1a2e"/>
  <rect width="1280" height="720" fill="url(#gl)"/>
  <rect width="1280" height="720" fill="url(#gr)"/>
  <rect width="1280" height="720" fill="url(#gc)"/>

  <!-- CRT scanline overlay -->
  <rect width="1280" height="720" fill="url(#scanlines)"/>

  <!-- Top neon accent bar -->
  <rect width="1280" height="4" fill="url(#tb)"/>

  <!-- ── Retro perspective grid (synthwave horizon) ── -->
  <g opacity="0.08">
    <!-- Horizontal grid lines converging toward horizon -->
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#e94560" stroke-width="1"/>
    <line x1="0" y1="496" x2="1280" y2="496" stroke="#e94560" stroke-width="0.8"/>
    <line x1="0" y1="514" x2="1280" y2="514" stroke="#e94560" stroke-width="0.6"/>
    <line x1="0" y1="534" x2="1280" y2="534" stroke="#e94560" stroke-width="0.5"/>
    <line x1="0" y1="556" x2="1280" y2="556" stroke="#e94560" stroke-width="0.4"/>
    <!-- Vertical grid lines radiating from center -->
    <line x1="640" y1="480" x2="640" y2="576" stroke="#e94560" stroke-width="0.8"/>
    <line x1="640" y1="480" x2="440" y2="576" stroke="#e94560" stroke-width="0.5"/>
    <line x1="640" y1="480" x2="840" y2="576" stroke="#e94560" stroke-width="0.5"/>
    <line x1="640" y1="480" x2="200" y2="576" stroke="#e94560" stroke-width="0.4"/>
    <line x1="640" y1="480" x2="1080" y2="576" stroke="#e94560" stroke-width="0.4"/>
    <line x1="640" y1="480" x2="-80" y2="576" stroke="#e94560" stroke-width="0.3"/>
    <line x1="640" y1="480" x2="1360" y2="576" stroke="#e94560" stroke-width="0.3"/>
  </g>

  <!-- ── Decorative corner brackets (80s UI frame) ── -->
  <g stroke-width="2" fill="none" opacity="0.25">
    <polyline points="80,60 80,30 110,30" stroke="#e94560"/>
    <polyline points="1200,60 1200,30 1170,30" stroke="#4ecca3"/>
    <polyline points="80,520 80,550 110,550" stroke="#4ecca3"/>
    <polyline points="1200,520 1200,550 1170,550" stroke="#e94560"/>
  </g>

  <!-- ── Floating decorative station shapes ── -->
  <!-- Circle station — top-left area -->
  <circle cx="165" cy="155" r="14" fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.18" filter="url(#sg)"/>
  <!-- Triangle station — top-right area -->
  <polygon points="1110,140 1124,168 1096,168" fill="none" stroke="#4ecca3" stroke-width="2.5" opacity="0.18" filter="url(#sg)"/>
  <!-- Rectangle station — left middle -->
  <rect x="94" y="368" width="24" height="24" fill="none" stroke="#f9a825" stroke-width="2.5" opacity="0.15" filter="url(#sg)"/>
  <!-- Diamond station — right middle -->
  <polygon points="1175,340 1189,354 1175,368 1161,354" fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.15" filter="url(#sg)"/>
  <!-- Pentagon station — lower-left -->
  <polygon points="210,478 222,472 231,481 226,494 214,494" fill="none" stroke="#4ecca3" stroke-width="2" opacity="0.12" filter="url(#sg)"/>
  <!-- Star station — lower-right -->
  <polygon points="1070,470 1074,482 1087,482 1077,490 1081,502 1070,495 1059,502 1063,490 1053,482 1066,482" fill="none" stroke="#f9a825" stroke-width="1.8" opacity="0.12" filter="url(#sg)"/>

  <!-- ── Horizontal neon accent lines ── -->
  <line x1="200" y1="130" x2="1080" y2="130" stroke="#e94560" stroke-width="1" opacity="0.15"/>
  <line x1="280" y1="440" x2="1000" y2="440" stroke="#4ecca3" stroke-width="1" opacity="0.12"/>

  <!-- ── Title glow shadow layer (large soft bloom behind text) ── -->
  <text x="640" y="270" text-anchor="middle" font-family="Arial Black,Impact,sans-serif"
    font-size="130" font-weight="900" fill="#e94560" opacity="0.10" filter="url(#neon-wide)">METRO</text>
  <text x="640" y="400" text-anchor="middle" font-family="Arial Black,Impact,sans-serif"
    font-size="130" font-weight="900" fill="#4ecca3" opacity="0.10" filter="url(#neon-wide)">MANIA</text>

  <!-- ── Title: METRO ── -->
  <text x="640" y="270" text-anchor="middle" font-family="Arial Black,Impact,sans-serif"
    font-size="130" font-weight="900" fill="url(#tg)" letter-spacing="6" filter="url(#neon)">METRO</text>

  <!-- ── Title: MANIA ── -->
  <text x="640" y="400" text-anchor="middle" font-family="Arial Black,Impact,sans-serif"
    font-size="130" font-weight="900" fill="url(#tg)" letter-spacing="6" filter="url(#neon)">MANIA</text>

  <!-- ── Gradient separator line ── -->
  <line x1="340" y1="428" x2="940" y2="428" stroke="url(#tb)" stroke-width="2" opacity="0.35"/>

  <!-- ── Subtitle (Arabic, RTL) ── -->
  <text x="640" y="472" text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
    font-size="22" fill="#9898b8" letter-spacing="1" font-weight="400" direction="rtl" unicode-bidi="bidi-override">Involved Code Retreat من تقديم Johnny Hooyberghs</text>
</svg>