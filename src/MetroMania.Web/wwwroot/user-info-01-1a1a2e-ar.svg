<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="gl" cx="18%" cy="52%" r="52%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gr" cx="82%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#4ecca3" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="55%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#4ecca3"/>
    </linearGradient>
    <linearGradient id="tb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#4ecca3"/>
    </linearGradient>
    <filter id="gf" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#1a1a2e"/>
  <rect width="1280" height="720" fill="url(#gl)"/>
  <rect width="1280" height="720" fill="url(#gr)"/>
  <rect width="1280" height="4" fill="url(#tb)"/>

  <!-- Metro network art (left panel 0-640) -->
  <polyline points="40,230 170,230 300,350 460,350 575,230 630,230"
    stroke="#e94560" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.80"/>
  <polyline points="40,450 145,450 250,535 400,535 510,450 630,450"
    stroke="#4ecca3" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.80"/>
  <line x1="300" y1="350" x2="250" y2="535" stroke="#f9a825" stroke-width="5" stroke-linecap="round" opacity="0.80"/>
  <line x1="460" y1="350" x2="400" y2="535" stroke="#f9a825" stroke-width="5" stroke-linecap="round" opacity="0.80"/>

  <!-- Stations: red line -->
  <circle cx="170" cy="230" r="13" fill="#1a1a2e" stroke="#e94560" stroke-width="3" filter="url(#gf)"/>
  <rect x="287" y="337" width="26" height="26" fill="#1a1a2e" stroke="#f9a825" stroke-width="3" filter="url(#gf)"/>
  <circle cx="460" cy="350" r="13" fill="#1a1a2e" stroke="#e94560" stroke-width="3" filter="url(#gf)"/>
  <polygon points="575,216 590,244 560,244" fill="#1a1a2e" stroke="#e94560" stroke-width="3" filter="url(#gf)"/>

  <!-- Stations: teal line -->
  <polygon points="145,436 159,450 145,464 131,450" fill="#1a1a2e" stroke="#4ecca3" stroke-width="3" filter="url(#gf)"/>
  <circle cx="250" cy="535" r="13" fill="#1a1a2e" stroke="#4ecca3" stroke-width="3" filter="url(#gf)"/>
  <polygon points="400,521 414,535 400,549 386,535" fill="#1a1a2e" stroke="#f9a825" stroke-width="3" filter="url(#gf)"/>
  <polygon points="510,436 524,464 496,464" fill="#1a1a2e" stroke="#4ecca3" stroke-width="3" filter="url(#gf)"/>

  <!-- Train cars -->
  <rect x="196" y="221" width="48" height="18" rx="9" fill="#e94560" opacity="0.95"/>
  <circle cx="207" cy="230" r="4" fill="#ff8888" opacity="0.7"/>
  <rect x="295" y="441" width="48" height="18" rx="9" fill="#4ecca3" opacity="0.95"/>
  <circle cx="306" cy="450" r="4" fill="#aafff0" opacity="0.7"/>

  <!-- Passenger dots -->
  <circle cx="158" cy="213" r="6" fill="#e0e0f0" opacity="0.55"/>
  <circle cx="168" cy="208" r="6" fill="#e0e0f0" opacity="0.55"/>
  <circle cx="238" cy="517" r="6" fill="#e0e0f0" opacity="0.55"/>
  <circle cx="249" cy="512" r="6" fill="#e0e0f0" opacity="0.55"/>
  <circle cx="389" cy="517" r="6" fill="#e0e0f0" opacity="0.55"/>

  <!-- Panel divider -->
  <line x1="658" y1="30" x2="658" y2="690" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

  <!-- Right panel: Title -->
  <text x="964" y="258" text-anchor="middle" font-family="Arial Black,Arial,sans-serif"
    font-size="96" font-weight="900" fill="url(#tg)" letter-spacing="-2">METRO</text>
  <text x="964" y="362" text-anchor="middle" font-family="Arial Black,Arial,sans-serif"
    font-size="96" font-weight="900" fill="url(#tg)" letter-spacing="-2">MANIA</text>

  <line x1="700" y1="384" x2="1228" y2="384" stroke="#e94560" stroke-width="1" opacity="0.30"/>

  <text x="964" y="420" text-anchor="middle" font-family="Arial,sans-serif"
    font-size="17" fill="#7878a0" letter-spacing="3" font-weight="600">تحدي برمجة C#</text>
  <text x="964" y="462" text-anchor="middle" font-family="Arial,sans-serif"
    font-size="21" fill="#c0c0d8">ابنِ روبوتك. اربط المحطات. وصِّل الركاب.</text>

  <!-- Stat pills -->
  <rect x="670" y="496" width="158" height="46" rx="23" fill="#e94560" fill-opacity="0.14" stroke="#e94560" stroke-width="1.5"/>
  <text x="749" y="524" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#e94560" font-weight="700">٦ أشكال</text>

  <rect x="843" y="496" width="188" height="46" rx="23" fill="#4ecca3" fill-opacity="0.14" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="937" y="524" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#4ecca3" font-weight="700">٣ موارد</text>

  <rect x="1046" y="496" width="158" height="46" rx="23" fill="#f9a825" fill-opacity="0.14" stroke="#f9a825" stroke-width="1.5"/>
  <text x="1125" y="524" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#f9a825" font-weight="700">٩ إجراءات</text>

  <!-- Bottom indicator -->
  <text x="640" y="694" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#3a3a5a">شريحة ١ / ٤  —  مقدمة</text>
</svg>