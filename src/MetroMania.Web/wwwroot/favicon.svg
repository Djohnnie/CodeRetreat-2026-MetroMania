<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- Train icon (Material Design "train" simplified) -->
  <g fill="#fff" transform="translate(10, 6)">
    <!-- Body -->
    <rect x="3" y="4" width="22" height="22" rx="4" fill="#fff" opacity="0.95"/>
    <!-- Windows -->
    <rect x="6" y="8" width="7" height="6" rx="1.5" fill="#2563eb"/>
    <rect x="15" y="8" width="7" height="6" rx="1.5" fill="#2563eb"/>
    <!-- Front panel line -->
    <rect x="6" y="17" width="16" height="2.5" rx="1" fill="#2563eb" opacity="0.3"/>
    <!-- Headlights -->
    <circle cx="9" cy="22" r="2" fill="#fbbf24"/>
    <circle cx="19" cy="22" r="2" fill="#fbbf24"/>
    <!-- Roof -->
    <rect x="5" y="2" width="18" height="3" rx="1.5" fill="#fff" opacity="0.7"/>
    <!-- Wheels / rail -->
    <rect x="2" y="28" width="24" height="2.5" rx="1.25" fill="#fff" opacity="0.5"/>
    <circle cx="9" cy="29" r="2.2" fill="#fff" opacity="0.8"/>
    <circle cx="19" cy="29" r="2.2" fill="#fff" opacity="0.8"/>
  </g>
</svg>
